name: Validate (PR)

# PR gate: build the jar + verify that the publish wiring is intact.
# Does NOT publish anywhere. Actual publishing lives in snapshot.yml
# (on push to main) and release.yml (on tag push).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by axion-release to read tags for version resolution.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Validate publish configuration
        # validatePublish is defined in build.gradle and asserts that the
        # publish tasks the downstream workflows invoke actually exist,
        # plus that the POM carries the fields Central Portal requires.
        # GITHUB_ACTOR is exported so the GitHubPackages repo block becomes
        # active and publishAllPublicationsToGitHubPackagesRepository is
        # visible to the task graph check below.
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew validatePublish --no-daemon
          ./gradlew tasks --all --no-daemon | grep -E "publishAllPublicationsToCentralPortal\b" || { echo "Missing: publishAllPublicationsToCentralPortal"; exit 1; }
          ./gradlew tasks --all --no-daemon | grep -E "publishAllPublicationsToCentralPortalSnapshots\b" || { echo "Missing: publishAllPublicationsToCentralPortalSnapshots"; exit 1; }
          ./gradlew tasks --all --no-daemon | grep -E "publishAllPublicationsToGitHubPackagesRepository\b" || { echo "Missing: publishAllPublicationsToGitHubPackagesRepository"; exit 1; }
          echo "Publish wiring OK"
